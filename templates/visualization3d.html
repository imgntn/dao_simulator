<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAO Simulator - 3D Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group label {
            display: inline-block;
            width: 120px;
            font-size: 12px;
        }
        .control-group input[type="range"] {
            width: 150px;
        }
        .control-group input[type="checkbox"] {
            margin-left: 5px;
        }
        #connection-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
        }
        .connected { color: #4f4; }
        .disconnected { color: #f44; }
        #legend {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .legend-item {
            margin: 5px 0;
            display: flex;
            align-items: center;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="stats">
        <h3 style="margin-top: 0;">DAO Statistics</h3>
        <div>Step: <span id="current-step">0</span></div>
        <div>Agents: <span id="agent-count">0</span></div>
        <div>Proposals: <span id="proposal-count">0</span></div>
        <div>Active Votes: <span id="vote-count">0</span></div>
        <div>Treasury: <span id="treasury-value">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>

    <div id="controls">
        <h3 style="margin-top: 0;">Visualization Controls</h3>
        <div class="control-group">
            <label>Particle Size:</label>
            <input type="range" id="particle-size" min="0.5" max="5" value="2" step="0.1">
        </div>
        <div class="control-group">
            <label>Force Strength:</label>
            <input type="range" id="force-strength" min="0" max="100" value="50" step="5">
        </div>
        <div class="control-group">
            <label>Rotation Speed:</label>
            <input type="range" id="rotation-speed" min="0" max="2" value="0.5" step="0.1">
        </div>
        <div class="control-group">
            <label>Show Edges:</label>
            <input type="checkbox" id="show-edges" checked>
        </div>
        <div class="control-group">
            <label>Show Particles:</label>
            <input type="checkbox" id="show-particles" checked>
        </div>
        <div class="control-group">
            <label>Auto-Rotate:</label>
            <input type="checkbox" id="auto-rotate" checked>
        </div>
    </div>

    <div id="connection-status">
        <span class="disconnected">● Disconnected</span>
    </div>

    <div id="legend">
        <h3 style="margin-top: 0;">Agent Types</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #4488ff;"></div>
            <span>Developer</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffaa44;"></div>
            <span>Investor</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #44ff88;"></div>
            <span>Validator</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff4488;"></div>
            <span>Arbitrator</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #fff;"></div>
            <span>Other</span>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000511);
        scene.fog = new THREE.Fog(0x000511, 100, 500);

        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.5, 0.4, 0.85
        );
        composer.addPass(bloomPass);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 300;
        controls.minDistance = 20;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(50, 50, 50);
        scene.add(directionalLight);

        // GPU-accelerated particle system for agents
        const MAX_AGENTS = 10000;
        const agentGeometry = new THREE.BufferGeometry();
        const agentPositions = new Float32Array(MAX_AGENTS * 3);
        const agentColors = new Float32Array(MAX_AGENTS * 3);
        const agentSizes = new Float32Array(MAX_AGENTS);
        const agentVelocities = new Float32Array(MAX_AGENTS * 3);

        // Initialize positions in a sphere
        for (let i = 0; i < MAX_AGENTS; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random() * 2 - 1);
            const radius = 30 + Math.random() * 20;
            
            agentPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            agentPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            agentPositions[i * 3 + 2] = radius * Math.cos(phi);
            
            agentColors[i * 3] = 1;
            agentColors[i * 3 + 1] = 1;
            agentColors[i * 3 + 2] = 1;
            
            agentSizes[i] = 0;
            
            agentVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
            agentVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
            agentVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
        }

        agentGeometry.setAttribute('position', new THREE.BufferAttribute(agentPositions, 3));
        agentGeometry.setAttribute('color', new THREE.BufferAttribute(agentColors, 3));
        agentGeometry.setAttribute('size', new THREE.BufferAttribute(agentSizes, 1));

        // Custom shader for GPU particle rendering
        const agentMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                particleSize: { value: 2.0 }
            },
            vertexShader: `
                attribute float size;
                attribute vec3 color;
                varying vec3 vColor;
                uniform float particleSize;
                uniform float time;
                
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * particleSize * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                
                void main() {
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float r = length(xy);
                    if (r > 0.5) discard;
                    
                    float intensity = 1.0 - smoothstep(0.0, 0.5, r);
                    gl_FragColor = vec4(vColor * intensity, intensity);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            vertexColors: true
        });

        const agentParticles = new THREE.Points(agentGeometry, agentMaterial);
        scene.add(agentParticles);

        // Edge system for connections (votes, delegations)
        const MAX_EDGES = 5000;
        const edgeGeometry = new THREE.BufferGeometry();
        const edgePositions = new Float32Array(MAX_EDGES * 6);
        const edgeColors = new Float32Array(MAX_EDGES * 6);
        const edgeOpacities = new Float32Array(MAX_EDGES * 2);

        edgeGeometry.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
        edgeGeometry.setAttribute('color', new THREE.BufferAttribute(edgeColors, 3));
        edgeGeometry.setAttribute('opacity', new THREE.BufferAttribute(edgeOpacities, 1));

        const edgeMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                attribute float opacity;
                attribute vec3 color;
                varying vec3 vColor;
                varying float vOpacity;
                
                void main() {
                    vColor = color;
                    vOpacity = opacity;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                varying vec3 vColor;
                varying float vOpacity;
                
                void main() {
                    float pulse = 0.5 + 0.5 * sin(time * 3.0);
                    gl_FragColor = vec4(vColor, vOpacity * pulse);
                }
            `,
            blending: THREE.AdditiveBlending,
            transparent: true,
            vertexColors: true,
            linewidth: 2
        });

        const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        scene.add(edges);

        // Proposal flow system (instanced meshes)
        const proposalGeometry = new THREE.IcosahedronGeometry(1, 0);
        const proposalMaterial = new THREE.MeshPhongMaterial({
            color: 0x00ff88,
            emissive: 0x00ff88,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.8
        });
        
        const MAX_PROPOSALS = 1000;
        const proposalMesh = new THREE.InstancedMesh(proposalGeometry, proposalMaterial, MAX_PROPOSALS);
        proposalMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(proposalMesh);

        // Data structures
        const agents = new Map();
        const proposals = new Map();
        const connections = [];
        let activeAgentCount = 0;
        let activeProposalCount = 0;
        let activeEdgeCount = 0;

        // WebSocket connection
        let ws = null;
        const wsUrl = `ws://localhost:8003/ws/visualization`;
        
        function connectWebSocket() {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('Connected to DAO simulation');
                document.querySelector('#connection-status span').className = 'connected';
                document.querySelector('#connection-status span').textContent = '● Connected';
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleSimulationEvent(data);
            };
            
            ws.onclose = () => {
                console.log('Disconnected from simulation');
                document.querySelector('#connection-status span').className = 'disconnected';
                document.querySelector('#connection-status span').textContent = '● Disconnected';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Agent type colors
        const agentTypeColors = {
            'Developer': new THREE.Color(0x4488ff),
            'Investor': new THREE.Color(0xffaa44),
            'Validator': new THREE.Color(0x44ff88),
            'Arbitrator': new THREE.Color(0xff4488),
            'Regulator': new THREE.Color(0xff44ff),
            'ServiceProvider': new THREE.Color(0x44ffff),
            'default': new THREE.Color(0xffffff)
        };

        function handleSimulationEvent(data) {
            const { event, step, ...params } = data;
            
            document.getElementById('current-step').textContent = step || 0;
            
            switch(event) {
                case 'agent_created':
                    createAgent(params);
                    break;
                case 'proposal_created':
                    createProposal(params);
                    break;
                case 'proposal_voted':
                    createVoteConnection(params);
                    break;
                case 'proposal_invested':
                    highlightInvestment(params);
                    break;
                case 'step_complete':
                    updateStats(params);
                    break;
            }
        }

        function createAgent(params) {
            const { agent_id, agent_type, tokens = 100 } = params;
            
            if (activeAgentCount >= MAX_AGENTS) return;
            
            const index = activeAgentCount;
            agents.set(agent_id, {
                index,
                type: agent_type,
                tokens,
                position: new THREE.Vector3(
                    agentPositions[index * 3],
                    agentPositions[index * 3 + 1],
                    agentPositions[index * 3 + 2]
                )
            });
            
            const color = agentTypeColors[agent_type] || agentTypeColors.default;
            agentColors[index * 3] = color.r;
            agentColors[index * 3 + 1] = color.g;
            agentColors[index * 3 + 2] = color.b;
            
            agentSizes[index] = Math.log(tokens + 1) * 0.5;
            
            agentGeometry.attributes.color.needsUpdate = true;
            agentGeometry.attributes.size.needsUpdate = true;
            
            activeAgentCount++;
            document.getElementById('agent-count').textContent = activeAgentCount;
        }

        function createProposal(params) {
            const { proposal_id, title, funding_goal = 1000 } = params;
            
            if (activeProposalCount >= MAX_PROPOSALS) return;
            
            const position = new THREE.Vector3(
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 100
            );
            
            proposals.set(proposal_id, {
                index: activeProposalCount,
                position,
                title,
                funding_goal,
                scale: 1
            });
            
            const matrix = new THREE.Matrix4();
            matrix.setPosition(position);
            proposalMesh.setMatrixAt(activeProposalCount, matrix);
            proposalMesh.instanceMatrix.needsUpdate = true;
            
            activeProposalCount++;
            document.getElementById('proposal-count').textContent = activeProposalCount;
        }

        function createVoteConnection(params) {
            const { agent_id, proposal_id, vote } = params;
            
            if (activeEdgeCount >= MAX_EDGES) return;
            
            const agent = agents.get(agent_id);
            const proposal = proposals.get(proposal_id);
            
            if (!agent || !proposal) return;
            
            const startIdx = activeEdgeCount * 6;
            const colorIdx = activeEdgeCount * 6;
            const opacityIdx = activeEdgeCount * 2;
            
            // Start point (agent)
            edgePositions[startIdx] = agent.position.x;
            edgePositions[startIdx + 1] = agent.position.y;
            edgePositions[startIdx + 2] = agent.position.z;
            
            // End point (proposal)
            edgePositions[startIdx + 3] = proposal.position.x;
            edgePositions[startIdx + 4] = proposal.position.y;
            edgePositions[startIdx + 5] = proposal.position.z;
            
            // Color based on vote
            const color = vote === 'yes' ? new THREE.Color(0x00ff00) : new THREE.Color(0xff0000);
            edgeColors[colorIdx] = color.r;
            edgeColors[colorIdx + 1] = color.g;
            edgeColors[colorIdx + 2] = color.b;
            edgeColors[colorIdx + 3] = color.r;
            edgeColors[colorIdx + 4] = color.g;
            edgeColors[colorIdx + 5] = color.b;
            
            edgeOpacities[opacityIdx] = 1.0;
            edgeOpacities[opacityIdx + 1] = 1.0;
            
            edgeGeometry.attributes.position.needsUpdate = true;
            edgeGeometry.attributes.color.needsUpdate = true;
            edgeGeometry.attributes.opacity.needsUpdate = true;
            
            activeEdgeCount++;
            document.getElementById('vote-count').textContent = activeEdgeCount;
            
            // Fade out edge over time
            setTimeout(() => {
                edgeOpacities[opacityIdx] *= 0.95;
                edgeOpacities[opacityIdx + 1] *= 0.95;
                edgeGeometry.attributes.opacity.needsUpdate = true;
            }, 100);
        }

        function highlightInvestment(params) {
            const { proposal_id, amount } = params;
            const proposal = proposals.get(proposal_id);
            
            if (!proposal) return;
            
            // Scale proposal based on investment
            proposal.scale = Math.min(5, 1 + Math.log(amount + 1) * 0.1);
            
            const matrix = new THREE.Matrix4();
            matrix.makeScale(proposal.scale, proposal.scale, proposal.scale);
            matrix.setPosition(proposal.position);
            proposalMesh.setMatrixAt(proposal.index, matrix);
            proposalMesh.instanceMatrix.needsUpdate = true;
        }

        function updateStats(params) {
            const { treasury_value, active_proposals, total_agents } = params;
            
            if (treasury_value !== undefined) {
                document.getElementById('treasury-value').textContent = 
                    treasury_value.toLocaleString();
            }
        }

        // Physics simulation
        function updatePhysics(deltaTime) {
            const forceStrength = parseFloat(document.getElementById('force-strength').value) / 1000;
            
            // Update agent positions with simple physics
            for (let i = 0; i < activeAgentCount; i++) {
                const idx = i * 3;
                
                // Apply velocity
                agentPositions[idx] += agentVelocities[idx] * deltaTime;
                agentPositions[idx + 1] += agentVelocities[idx + 1] * deltaTime;
                agentPositions[idx + 2] += agentVelocities[idx + 2] * deltaTime;
                
                // Apply gravity towards center
                const distance = Math.sqrt(
                    agentPositions[idx] ** 2 +
                    agentPositions[idx + 1] ** 2 +
                    agentPositions[idx + 2] ** 2
                );
                
                if (distance > 0.1) {
                    const force = forceStrength / distance;
                    agentVelocities[idx] -= (agentPositions[idx] / distance) * force;
                    agentVelocities[idx + 1] -= (agentPositions[idx + 1] / distance) * force;
                    agentVelocities[idx + 2] -= (agentPositions[idx + 2] / distance) * force;
                }
                
                // Apply damping
                agentVelocities[idx] *= 0.99;
                agentVelocities[idx + 1] *= 0.99;
                agentVelocities[idx + 2] *= 0.99;
                
                // Keep within bounds
                const maxDist = 100;
                if (distance > maxDist) {
                    const scale = maxDist / distance;
                    agentPositions[idx] *= scale;
                    agentPositions[idx + 1] *= scale;
                    agentPositions[idx + 2] *= scale;
                }
            }
            
            agentGeometry.attributes.position.needsUpdate = true;
        }

        // Controls
        document.getElementById('particle-size').addEventListener('input', (e) => {
            agentMaterial.uniforms.particleSize.value = parseFloat(e.target.value);
        });

        document.getElementById('show-edges').addEventListener('change', (e) => {
            edges.visible = e.target.checked;
        });

        document.getElementById('show-particles').addEventListener('change', (e) => {
            agentParticles.visible = e.target.checked;
        });

        // Animation loop
        const clock = new THREE.Clock();
        let frameCount = 0;
        let lastFpsUpdate = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const deltaTime = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            
            // Update FPS counter
            frameCount++;
            if (elapsedTime - lastFpsUpdate > 1) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsUpdate = elapsedTime;
            }
            
            // Update physics
            updatePhysics(deltaTime);
            
            // Update shader uniforms
            agentMaterial.uniforms.time.value = elapsedTime;
            edgeMaterial.uniforms.time.value = elapsedTime;
            
            // Auto-rotate camera
            if (document.getElementById('auto-rotate').checked) {
                const rotationSpeed = parseFloat(document.getElementById('rotation-speed').value);
                scene.rotation.y += deltaTime * rotationSpeed * 0.1;
            }
            
            // Rotate proposals
            proposalMesh.rotation.y += deltaTime * 0.5;
            proposalMesh.rotation.x += deltaTime * 0.3;
            
            // Fade edges
            for (let i = 0; i < activeEdgeCount * 2; i++) {
                if (edgeOpacities[i] > 0.01) {
                    edgeOpacities[i] *= 0.995;
                }
            }
            edgeGeometry.attributes.opacity.needsUpdate = true;
            
            controls.update();
            composer.render();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation and WebSocket connection
        animate();
        connectWebSocket();

        // Generate some test data if not connected
        setTimeout(() => {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.log('Generating test data...');
                
                // Create test agents
                for (let i = 0; i < 100; i++) {
                    createAgent({
                        agent_id: `agent_${i}`,
                        agent_type: ['Developer', 'Investor', 'Validator', 'Arbitrator'][Math.floor(Math.random() * 4)],
                        tokens: Math.random() * 1000
                    });
                }
                
                // Create test proposals
                for (let i = 0; i < 10; i++) {
                    createProposal({
                        proposal_id: `proposal_${i}`,
                        title: `Test Proposal ${i}`,
                        funding_goal: Math.random() * 10000
                    });
                }
                
                // Create test connections
                setInterval(() => {
                    if (activeAgentCount > 0 && activeProposalCount > 0) {
                        createVoteConnection({
                            agent_id: `agent_${Math.floor(Math.random() * activeAgentCount)}`,
                            proposal_id: `proposal_${Math.floor(Math.random() * activeProposalCount)}`,
                            vote: Math.random() > 0.5 ? 'yes' : 'no'
                        });
                    }
                }, 500);
            }
        }, 2000);
    </script>
</body>
</html>
