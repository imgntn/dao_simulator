<!DOCTYPE html>
<html>
<head>
    <title>DAO Web Interface</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="/static/dashboard_network.js"></script>
</head>
<body>
<header>
    <h1>DAO Web Interface</h1>
    <button id="themeToggle" @click="toggleTheme">Toggle Theme</button>
</header>
<main id="app" class="container">
    <section id="controls">
        <form id="settingsForm">
            <div v-for="(value, key) in settings" :key="key">
                <label>{{ key }}<input v-model="settings[key]" /></label>
            </div>
        </form>
        <button @click="startSim">Start</button>
        <button @click="stepSim">Step</button>
    </section>
    <section>
        <pre id="output" class="log">{{ output }}</pre>
    </section>
    <section>
        <h2>Live Metrics</h2>
        <ul>
            <li>Members: <span>{{ members }}</span></li>
            <li>DAO Token Price: <span>{{ price.toFixed(2) }}</span></li>
            <li>Recent Proposals:</li>
            <ul>
                <li v-for="p in proposals" :key="p">{{ p }}</li>
            </ul>
        </ul>
    </section>
    <section id="metrics">
        <div id="priceChart"></div>
        <div id="giniChart"></div>
    </section>
    <section>
        <h2>Tutorial Progress</h2>
        <ul>
            <li v-for="t in completed" :key="'c'+t">✅ {{ t }}</li>
            <li v-for="t in remaining" :key="'r'+t">⬜ {{ t }}</li>
        </ul>
    </section>
    <section>
        <h2>Delegation Network</h2>
        <div id="network"></div>
    </section>
</main>
<script>
const { createApp } = Vue;
createApp({
    data() {
        return {
            settings: {},
            members: 0,
            price: 0,
            proposals: [],
            output: '',
            completed: [],
            remaining: []
        };
    },
    methods: {
        async loadSettings() {
            const resp = await fetch('/settings');
            this.settings = await resp.json();
        },
        async saveSettings() {
            await fetch('/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.settings)
            });
        },
        async startSim() {
            await this.saveSettings();
            await fetch('/start', { method: 'POST' });
        },
        async stepSim() {
            const r = await fetch('/step', { method: 'POST' });
            const d = await r.json();
            this.output = JSON.stringify(d, null, 2);
        },
        toggleTheme() {
            document.body.classList.toggle('dark');
            const t = document.body.classList.contains('dark') ? 'dark' : 'light';
            localStorage.setItem('theme', t);
        }
    },
    mounted() {
        this.loadSettings();
        const priceTrace = { x: [], y: [], mode: 'lines', name: 'Price' };
        const giniTrace = { x: [], y: [], mode: 'lines', name: 'Gini' };
        Plotly.newPlot('priceChart', [priceTrace]);
        Plotly.newPlot('giniChart', [giniTrace]);
        const ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onmessage = (ev) => {
            const data = JSON.parse(ev.data);
            if (data.event === 'step_end') {
                this.members = data.num_members;
                this.price = data.token_price;
                this.proposals = data.recent_proposals;
                priceTrace.x = data.price_history.map((_, i) => i);
                priceTrace.y = data.price_history;
                giniTrace.x = data.gini_history.map((_, i) => i);
                giniTrace.y = data.gini_history;
                Plotly.react('priceChart', [priceTrace]);
                Plotly.react('giniChart', [giniTrace]);
            } else if (data.event === 'network_update') {
                window.handleNetworkUpdate(data);
            } else if (data.event === 'scenario_progress') {
                this.completed = data.completed;
                this.remaining = data.remaining;
            }
        };
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
            document.body.classList.add('dark');
        }
    }
}).mount('#app');
</script>
</body>
</html>
