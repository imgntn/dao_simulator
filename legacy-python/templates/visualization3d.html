<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAO Simulator - 3D Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group label {
            display: inline-block;
            width: 120px;
            font-size: 12px;
        }
        .control-group input[type="range"] {
            width: 150px;
        }
        .control-group input[type="checkbox"] {
            margin-left: 5px;
        }
        #connection-status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
        }
        .connected { color: #4f4; }
        .disconnected { color: #f44; }
        #legend {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .legend-item {
            margin: 5px 0;
            display: flex;
            align-items: center;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="stats">
        <h3 style="margin-top: 0;">DAO Statistics</h3>
        <div>Step: <span id="current-step">0</span></div>
        <div>Agents: <span id="agent-count">0</span></div>
        <div>Proposals: <span id="proposal-count">0</span></div>
        <div>Active Votes: <span id="vote-count">0</span></div>
        <div>Treasury: <span id="treasury-value">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>

    <div id="controls">
        <h3 style="margin-top: 0;">Visualization Controls</h3>
        <div class="control-group">
            <label>Particle Size:</label>
            <input type="range" id="particle-size" min="0.5" max="5" value="2" step="0.1">
        </div>
        <div class="control-group">
            <label>Force Strength:</label>
            <input type="range" id="force-strength" min="0" max="100" value="50" step="5">
        </div>
        <div class="control-group">
            <label>Rotation Speed:</label>
            <input type="range" id="rotation-speed" min="0" max="2" value="0.5" step="0.1">
        </div>
        <div class="control-group">
            <label>Show Edges:</label>
            <input type="checkbox" id="show-edges" checked>
        </div>
        <div class="control-group">
            <label>Show Particles:</label>
            <input type="checkbox" id="show-particles" checked>
        </div>
        <div class="control-group">
            <label>Auto-Rotate:</label>
            <input type="checkbox" id="auto-rotate" checked>
        </div>
        <div class="control-group">
            <label>Line Decay:</label>
            <input type="range" id="line-decay" min="0.90" max="0.999" value="0.995" step="0.001">
        </div>
        <div class="control-group">
            <button id="clear-edges" style="padding:6px 10px; border-radius:4px; border:none; cursor:pointer;">Clear Edges</button>
        </div>
        <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">
        <div class="control-group">
            <label>Follow Selected:</label>
            <input type="checkbox" id="follow-selected">
        </div>
        <div class="control-group">
            <label>Zoom To Fit:</label>
            <button id="zoom-fit" style="padding:6px 10px; border-radius:4px; border:none; cursor:pointer;">Zoom</button>
        </div>
        <div class="control-group">
            <label>Find Agent ID:</label>
            <input id="find-agent" placeholder="agent_12" style="width:140px;">
            <button id="find-agent-btn" style="padding:4px 8px; border-radius:4px; border:none; cursor:pointer;">Go</button>
        </div>
        <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">
        <div class="control-group">
            <label>Show Monitoring:</label>
            <input type="checkbox" id="show-monitoring" checked>
        </div>
        <div class="control-group">
            <label>Show Service:</label>
            <input type="checkbox" id="show-service" checked>
        </div>
        <div class="control-group">
            <label>Show Dispute:</label>
            <input type="checkbox" id="show-dispute" checked>
        </div>
    </div>

    <div id="connection-status">
        <span class="disconnected">● Disconnected</span>
    </div>

    <div id="legend">
        <h3 style="margin-top: 0;">Legend</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #4488ff;"></div>
            <span>Developer</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffaa44;"></div>
            <span>Investor</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #44ff88;"></div>
            <span>Validator</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff4488;"></div>
            <span>Arbitrator</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #fff;"></div>
            <span>Other</span>
        </div>
        <hr style="border-color: rgba(255,255,255,0.1);">
        <div class="legend-item">
            <div class="legend-color" style="background: #00ff00; border-radius: 2px;"></div>
            <span>Vote Yes</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff0000; border-radius: 2px;"></div>
            <span>Vote No</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #00ffff; border-radius: 2px;"></div>
            <span>Service</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #00aaff; border-radius: 2px;"></div>
            <span>Monitoring</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffa500; border-radius: 2px;"></div>
            <span>Dispute</span>
        </div>
    </div>

    <div id="selection" style="position:absolute; left:50%; transform: translateX(-50%); bottom: 10px; color:#fff; background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); min-width: 300px; text-align: center;">
        <span id="selection-label">No selection</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000511);
        scene.fog = new THREE.Fog(0x000511, 100, 500);

        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.5, 0.4, 0.85
        );
        composer.addPass(bloomPass);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 300;
        controls.minDistance = 20;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(50, 50, 50);
        scene.add(directionalLight);

        // City ground and grid
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000),
            new THREE.MeshStandardMaterial({ color: 0x0c0f18, roughness: 1.0, metalness: 0.0 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -5;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(1000, 100, 0x112233, 0x112233);
        grid.material.opacity = 0.25;
        grid.material.transparent = true;
        scene.add(grid);

        // Central DAO HQ building
        const daoHq = new THREE.Mesh(
            new THREE.BoxGeometry(20, 50, 20),
            new THREE.MeshStandardMaterial({ color: 0x203a74, emissive: 0x0a1f4f, emissiveIntensity: 0.4 })
        );
        daoHq.position.set(0, 25, 0);
        daoHq.castShadow = true;
        scene.add(daoHq);

        function updateDaoHqHeight(value = 0) {
            const minH = 20;
            const maxH = 200;
            const h = Math.max(minH, Math.min(maxH, Math.log((value || 1) + 1) * 8));
            daoHq.scale.y = h / 50;
            daoHq.position.y = h / 2;
        }

        // GPU-accelerated particle system for agents
        const MAX_AGENTS = 10000;
        const agentGeometry = new THREE.BufferGeometry();
        const agentPositions = new Float32Array(MAX_AGENTS * 3);
        const agentColors = new Float32Array(MAX_AGENTS * 3);
        const agentSizes = new Float32Array(MAX_AGENTS);
        const agentVelocities = new Float32Array(MAX_AGENTS * 3);

        // Initialize positions in a sphere
        for (let i = 0; i < MAX_AGENTS; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random() * 2 - 1);
            const radius = 30 + Math.random() * 20;
            
            agentPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            agentPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            agentPositions[i * 3 + 2] = radius * Math.cos(phi);
            
            agentColors[i * 3] = 1;
            agentColors[i * 3 + 1] = 1;
            agentColors[i * 3 + 2] = 1;
            
            agentSizes[i] = 0;
            
            agentVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
            agentVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
            agentVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
        }

        agentGeometry.setAttribute('position', new THREE.BufferAttribute(agentPositions, 3));
        agentGeometry.setAttribute('color', new THREE.BufferAttribute(agentColors, 3));
        agentGeometry.setAttribute('size', new THREE.BufferAttribute(agentSizes, 1));

        // Custom shader for GPU particle rendering
        const agentMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                particleSize: { value: 2.0 }
            },
            vertexShader: `
                attribute float size;
                attribute vec3 color;
                varying vec3 vColor;
                uniform float particleSize;
                uniform float time;
                
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * particleSize * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                
                void main() {
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float r = length(xy);
                    if (r > 0.5) discard;
                    
                    float intensity = 1.0 - smoothstep(0.0, 0.5, r);
                    gl_FragColor = vec4(vColor * intensity, intensity);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            vertexColors: true
        });

        const agentParticles = new THREE.Points(agentGeometry, agentMaterial);
        scene.add(agentParticles);

        // Edge system for connections (votes, delegations)
        const MAX_EDGES = 5000;
        const edgeGeometry = new THREE.BufferGeometry();
        const edgePositions = new Float32Array(MAX_EDGES * 6);
        const edgeColors = new Float32Array(MAX_EDGES * 6);
        const edgeOpacities = new Float32Array(MAX_EDGES * 2);

        edgeGeometry.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
        edgeGeometry.setAttribute('color', new THREE.BufferAttribute(edgeColors, 3));
        edgeGeometry.setAttribute('opacity', new THREE.BufferAttribute(edgeOpacities, 1));

        const edgeMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                attribute float opacity;
                attribute vec3 color;
                varying vec3 vColor;
                varying float vOpacity;
                
                void main() {
                    vColor = color;
                    vOpacity = opacity;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                varying vec3 vColor;
                varying float vOpacity;
                
                void main() {
                    float pulse = 0.5 + 0.5 * sin(time * 3.0);
                    gl_FragColor = vec4(vColor, vOpacity * pulse);
                }
            `,
            blending: THREE.AdditiveBlending,
            transparent: true,
            vertexColors: true,
            linewidth: 2
        });

        const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        scene.add(edges);

        // Proposal flow system (instanced meshes)
        const proposalGeometry = new THREE.IcosahedronGeometry(1, 0);
        const proposalMaterial = new THREE.MeshPhongMaterial({
            color: 0x00ff88,
            emissive: 0x00ff88,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.8
        });
        
        const MAX_PROPOSALS = 1000;
        const proposalMesh = new THREE.InstancedMesh(proposalGeometry, proposalMaterial, MAX_PROPOSALS);
        proposalMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(proposalMesh);

        // Project buildings (instanced)
        const MAX_PROJECTS = 1000;
        const projectGeometry = new THREE.BoxGeometry(6, 10, 6);
        const projectMaterial = new THREE.MeshStandardMaterial({ color: 0x226644, emissive: 0x0b2a1a, emissiveIntensity: 0.3 });
        const projectMesh = new THREE.InstancedMesh(projectGeometry, projectMaterial, MAX_PROJECTS);
        projectMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(projectMesh);

        // Data structures
        const agents = new Map();
        const proposals = new Map();
        const connections = [];
        let activeAgentCount = 0;
        let activeProposalCount = 0;
        let activeEdgeCount = 0;
        const projects = new Map();
        let activeProjectCount = 0;

        // Layout helpers
        function ringLayout(index, radius = 60, height = 4) {
            const angle = (index / Math.max(1, activeProposalCount + 8)) * Math.PI * 2;
            return new THREE.Vector3(
                Math.cos(angle) * radius,
                height,
                Math.sin(angle) * radius
            );
        }
        function projectDistrictLayout(index) {
            const perRow = 20;
            const spacing = 18;
            const row = Math.floor(index / perRow);
            const col = index % perRow;
            const base = new THREE.Vector3(-perRow * spacing * 0.5, 0, 120 + row * spacing);
            return base.add(new THREE.Vector3(col * spacing, 0, 0));
        }

        // Picking / selection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedAgentId = null;
        let selectedProposalId = null;
        let followOffset = new THREE.Vector3(0, 8, 16);
        const selectionLabel = document.getElementById('selection-label');

        // WebSocket connection
        let ws = null;
        const wsUrl = `ws://localhost:8003/ws/visualization`;
        
        function connectWebSocket() {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('Connected to DAO simulation');
                document.querySelector('#connection-status span').className = 'connected';
                document.querySelector('#connection-status span').textContent = '● Connected';
                // Load snapshot to place projects and seed proposal layout
                loadSnapshot();
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleSimulationEvent(data);
            };
            
            ws.onclose = () => {
                console.log('Disconnected from simulation');
                document.querySelector('#connection-status span').className = 'disconnected';
                document.querySelector('#connection-status span').textContent = '● Disconnected';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Agent type colors
        const agentTypeColors = {
            'Developer': new THREE.Color(0x4488ff),
            'Investor': new THREE.Color(0xffaa44),
            'Validator': new THREE.Color(0x44ff88),
            'Arbitrator': new THREE.Color(0xff4488),
            'Regulator': new THREE.Color(0xff44ff),
            'ServiceProvider': new THREE.Color(0x44ffff),
            'default': new THREE.Color(0xffffff)
        };

        function handleSimulationEvent(data) {
            const { event, step, ...params } = data;
            
            document.getElementById('current-step').textContent = step || 0;
            
            switch(event) {
                case 'agent_created':
                    createAgent(params);
                    break;
                case 'proposal_created':
                    createProposal(params);
                    break;
                case 'proposal_voted':
                    createVoteConnection(params);
                    break;
                case 'proposal_invested':
                    highlightInvestment(params);
                    break;
                case 'service_offered':
                    visualizeService(params);
                    break;
                case 'project_disputed':
                    visualizeDispute(params);
                    break;
                case 'project_monitored':
                    visualizeMonitoring(params);
                    break;
                case 'compliance_checked':
                    visualizeCompliance(params);
                    break;
                case 'violation_created':
                    visualizeViolation(params);
                    break;
                case 'step_end':
                    // Update any step-based stats if needed
                    break;
                case 'step_complete':
                    updateStats(params);
                    if (params.treasury_value !== undefined) {
                        updateDaoHqHeight(params.treasury_value);
                    }
                    break;
            }
        }

        function createAgent(params) {
            const { agent_id, agent_type, tokens = 100 } = params;
            
            if (activeAgentCount >= MAX_AGENTS) return;
            
            const index = activeAgentCount;
            agents.set(agent_id, {
                index,
                type: agent_type,
                tokens,
                position: new THREE.Vector3(
                    agentPositions[index * 3],
                    agentPositions[index * 3 + 1],
                    agentPositions[index * 3 + 2]
                )
            });
            
            const color = agentTypeColors[agent_type] || agentTypeColors.default;
            agentColors[index * 3] = color.r;
            agentColors[index * 3 + 1] = color.g;
            agentColors[index * 3 + 2] = color.b;
            
            agentSizes[index] = Math.log(tokens + 1) * 0.5;
            
            agentGeometry.attributes.color.needsUpdate = true;
            agentGeometry.attributes.size.needsUpdate = true;
            
            activeAgentCount++;
            document.getElementById('agent-count').textContent = activeAgentCount;
        }

        function createProposal(params) {
            const { proposal_id, title, funding_goal = 1000 } = params;
            
            if (activeProposalCount >= MAX_PROPOSALS) return;
            
            const position = ringLayout(activeProposalCount, 60, 4);
            
            proposals.set(proposal_id, {
                index: activeProposalCount,
                position,
                title,
                funding_goal,
                scale: 1
            });
            
            const matrix = new THREE.Matrix4();
            matrix.setPosition(position);
            proposalMesh.setMatrixAt(activeProposalCount, matrix);
            proposalMesh.instanceMatrix.needsUpdate = true;
            
            activeProposalCount++;
            document.getElementById('proposal-count').textContent = activeProposalCount;
        }

        function highlightSelection() {
            const parts = [];
            if (selectedAgentId && agents.has(selectedAgentId)) {
                const a = agents.get(selectedAgentId);
                parts.push(`Agent: ${selectedAgentId} (${a.type})`);
            }
            if (selectedProposalId && proposals.has(selectedProposalId)) {
                const p = proposals.get(selectedProposalId);
                parts.push(`Proposal: ${selectedProposalId}${p.title ? ' – ' + p.title : ''}`);
            }
            selectionLabel.textContent = parts.length ? parts.join(' | ') : 'No selection';
        }

        function setSelectedAgent(agentId) {
            selectedAgentId = agentId;
            selectedProposalId = null;
            highlightSelection();
        }

        function setSelectedProposal(pid) {
            selectedProposalId = pid;
            selectedAgentId = null;
            highlightSelection();
        }

        function createVoteConnection(params) {
            const { agent_id, proposal_id, vote } = params;
            
            if (activeEdgeCount >= MAX_EDGES) return;
            
            const agent = agents.get(agent_id);
            const proposal = proposals.get(proposal_id);
            
            if (!agent || !proposal) return;
            
            const startIdx = activeEdgeCount * 6;
            const colorIdx = activeEdgeCount * 6;
            const opacityIdx = activeEdgeCount * 2;
            
            // Start point (agent)
            edgePositions[startIdx] = agent.position.x;
            edgePositions[startIdx + 1] = agent.position.y;
            edgePositions[startIdx + 2] = agent.position.z;
            
            // End point (proposal)
            edgePositions[startIdx + 3] = proposal.position.x;
            edgePositions[startIdx + 4] = proposal.position.y;
            edgePositions[startIdx + 5] = proposal.position.z;
            
            // Color based on vote
            const color = vote === 'yes' ? new THREE.Color(0x00ff00) : new THREE.Color(0xff0000);
            edgeColors[colorIdx] = color.r;
            edgeColors[colorIdx + 1] = color.g;
            edgeColors[colorIdx + 2] = color.b;
            edgeColors[colorIdx + 3] = color.r;
            edgeColors[colorIdx + 4] = color.g;
            edgeColors[colorIdx + 5] = color.b;
            
            edgeOpacities[opacityIdx] = 1.0;
            edgeOpacities[opacityIdx + 1] = 1.0;
            
            edgeGeometry.attributes.position.needsUpdate = true;
            edgeGeometry.attributes.color.needsUpdate = true;
            edgeGeometry.attributes.opacity.needsUpdate = true;
            
            activeEdgeCount++;
            // Limit draw range to active segments
            edgeGeometry.setDrawRange(0, activeEdgeCount * 2);
            document.getElementById('vote-count').textContent = activeEdgeCount;
            
            // Fade out edge over time
            setTimeout(() => {
                edgeOpacities[opacityIdx] *= 0.95;
                edgeOpacities[opacityIdx + 1] *= 0.95;
                edgeGeometry.attributes.opacity.needsUpdate = true;
            }, 100);
        }

        function highlightInvestment(params) {
            const { proposal_id, proposal, amount } = params;
            const prop = proposals.get(proposal_id) || findProposalByTitle(proposal);
            
            if (!prop) return;
            
            // Scale proposal based on investment
            prop.scale = Math.min(5, 1 + Math.log(amount + 1) * 0.1);
            
            const matrix = new THREE.Matrix4();
            matrix.makeScale(prop.scale, prop.scale, prop.scale);
            matrix.setPosition(prop.position);
            proposalMesh.setMatrixAt(prop.index, matrix);
            proposalMesh.instanceMatrix.needsUpdate = true;
        }

        function addOrUpdateProject(proj) {
            const { title, progress = 0, duration = 1, current_funding = 0 } = proj;
            if (!title) return;
            let rec = projects.get(title);
            if (!rec) {
                if (activeProjectCount >= MAX_PROJECTS) return;
                const idx = activeProjectCount;
                const pos = projectDistrictLayout(idx);
                rec = { index: idx, position: pos, height: 10 };
                projects.set(title, rec);
                activeProjectCount++;
            }
            const ratio = Math.max(0, Math.min(1, duration ? (progress / duration) : 0));
            const baseH = 8 + Math.log((current_funding || 0) + 1) * 1.5;
            const height = baseH + ratio * 30;
            rec.height = height;
            const m = new THREE.Matrix4();
            const s = new THREE.Matrix4(); s.makeScale(1, height / 10, 1);
            const t = new THREE.Matrix4(); t.makeTranslation(rec.position.x, height / 2, rec.position.z);
            m.multiplyMatrices(t, s);
            projectMesh.setMatrixAt(rec.index, m);
            projectMesh.instanceMatrix.needsUpdate = true;
        }

        async function loadSnapshot() {
            try {
                const res = await fetch('/snapshot');
                if (!res.ok) return;
                const snap = await res.json();
                if (Array.isArray(snap.projects)) snap.projects.forEach(addOrUpdateProject);
                if (Array.isArray(snap.proposals)) {
                    snap.proposals.forEach((p) => {
                        if (!proposals.has(p.id)) {
                            createProposal({ proposal_id: p.id, title: p.title, funding_goal: p.funding_goal });
                        }
                    });
                }
            } catch (e) {
                console.warn('Snapshot load failed', e);
            }
        }

        function findProposalByTitle(title) {
            if (!title) return null;
            for (const [_, p] of proposals) {
                if (p.title === title) return p;
            }
            return null;
        }

        function createGenericConnection(agentId, proposalRef, colorHex, lineType) {
            // Respect toggles
            if (lineType === 'monitoring' && !document.getElementById('show-monitoring').checked) return;
            if (lineType === 'service' && !document.getElementById('show-service').checked) return;
            if (lineType === 'dispute' && !document.getElementById('show-dispute').checked) return;
            const agent = agents.get(agentId);
            const proposal = typeof proposalRef === 'string' ? proposals.get(proposalRef) : proposalRef;
            if (!agent || !proposal) return;

            if (activeEdgeCount >= MAX_EDGES) return;
            const startIdx = activeEdgeCount * 6;
            const colorIdx = activeEdgeCount * 6;
            const opacityIdx = activeEdgeCount * 2;

            edgePositions[startIdx] = agent.position.x;
            edgePositions[startIdx + 1] = agent.position.y;
            edgePositions[startIdx + 2] = agent.position.z;
            edgePositions[startIdx + 3] = proposal.position.x;
            edgePositions[startIdx + 4] = proposal.position.y;
            edgePositions[startIdx + 5] = proposal.position.z;

            const color = new THREE.Color(colorHex);
            edgeColors[colorIdx] = color.r;
            edgeColors[colorIdx + 1] = color.g;
            edgeColors[colorIdx + 2] = color.b;
            edgeColors[colorIdx + 3] = color.r;
            edgeColors[colorIdx + 4] = color.g;
            edgeColors[colorIdx + 5] = color.b;

            edgeOpacities[opacityIdx] = 1.0;
            edgeOpacities[opacityIdx + 1] = 1.0;

            edgeGeometry.attributes.position.needsUpdate = true;
            edgeGeometry.attributes.color.needsUpdate = true;
            edgeGeometry.attributes.opacity.needsUpdate = true;
            activeEdgeCount++;
        }

        function visualizeService(params) {
            const { provider, proposal, proposal_id } = params;
            const prop = proposals.get(proposal_id) || findProposalByTitle(proposal);
            createGenericConnection(provider, prop, 0x00ffff, 'service'); // cyan
        }

        function visualizeDispute(params) {
            const { validator, project, proposal_id } = params;
            const prop = proposals.get(proposal_id) || findProposalByTitle(project);
            createGenericConnection(validator, prop, 0xffa500, 'dispute'); // orange
        }

        function visualizeMonitoring(params) {
            const { project, validator, proposal_id } = params;
            const prop = proposals.get(proposal_id) || findProposalByTitle(project);
            createGenericConnection(validator, prop, 0x00aaff, 'monitoring'); // blue
        }

        function visualizeCompliance(params) {
            const { project, compliant } = params;
            const rec = project ? projects.get(project) : null;
            if (rec) {
                const s = compliant ? 1.1 : 1.3;
                const m = new THREE.Matrix4();
                const sm = new THREE.Matrix4(); sm.makeScale(1, (rec.height / 10) * s, 1);
                const tm = new THREE.Matrix4(); tm.makeTranslation(rec.position.x, (rec.height * s) / 2, rec.position.z);
                m.multiplyMatrices(tm, sm);
                projectMesh.setMatrixAt(rec.index, m);
                projectMesh.instanceMatrix.needsUpdate = true;
                setTimeout(() => {
                    const m2 = new THREE.Matrix4();
                    const s2 = new THREE.Matrix4(); s2.makeScale(1, rec.height / 10, 1);
                    const t2 = new THREE.Matrix4(); t2.makeTranslation(rec.position.x, rec.height / 2, rec.position.z);
                    m2.multiplyMatrices(t2, s2);
                    projectMesh.setMatrixAt(rec.index, m2);
                    projectMesh.instanceMatrix.needsUpdate = true;
                }, 600);
                return;
            }
            const prop = findProposalByTitle(project);
            if (!prop) return;
            const matrix = new THREE.Matrix4();
            const scale = compliant ? 1.2 : 1.5;
            matrix.makeScale(scale, scale, scale);
            matrix.setPosition(prop.position);
            proposalMesh.setMatrixAt(prop.index, matrix);
            proposalMesh.instanceMatrix.needsUpdate = true;
            setTimeout(() => {
                const m2 = new THREE.Matrix4();
                m2.setPosition(prop.position);
                proposalMesh.setMatrixAt(prop.index, m2);
                proposalMesh.instanceMatrix.needsUpdate = true;
            }, 600);
        }

        function visualizeViolation(params) {
            const { violator } = params;
            const agent = agents.get(violator);
            if (!agent) return;
            const idx = agent.index;
            const prev = [agentColors[idx * 3], agentColors[idx * 3 + 1], agentColors[idx * 3 + 2]];
            // flash red and grow size briefly
            const red = new THREE.Color(0xff0000);
            agentColors[idx * 3] = red.r;
            agentColors[idx * 3 + 1] = red.g;
            agentColors[idx * 3 + 2] = red.b;
            agentSizes[idx] = Math.max(agentSizes[idx], 4.0);
            agentGeometry.attributes.color.needsUpdate = true;
            agentGeometry.attributes.size.needsUpdate = true;
            setTimeout(() => {
                agentColors[idx * 3] = prev[0];
                agentColors[idx * 3 + 1] = prev[1];
                agentColors[idx * 3 + 2] = prev[2];
                agentSizes[idx] *= 0.5;
                agentGeometry.attributes.color.needsUpdate = true;
                agentGeometry.attributes.size.needsUpdate = true;
            }, 800);
        }

        function updateStats(params) {
            const { treasury_value, active_proposals, total_agents } = params;
            
            if (treasury_value !== undefined) {
                document.getElementById('treasury-value').textContent = 
                    treasury_value.toLocaleString();
            }
        }

        // Physics simulation
        function updatePhysics(deltaTime) {
            const forceStrength = parseFloat(document.getElementById('force-strength').value) / 1000;
            
            // Update agent positions with simple physics
            for (let i = 0; i < activeAgentCount; i++) {
                const idx = i * 3;
                
                // Apply velocity
                agentPositions[idx] += agentVelocities[idx] * deltaTime;
                agentPositions[idx + 1] += agentVelocities[idx + 1] * deltaTime;
                agentPositions[idx + 2] += agentVelocities[idx + 2] * deltaTime;
                
                // Apply gravity towards center
                const distance = Math.sqrt(
                    agentPositions[idx] ** 2 +
                    agentPositions[idx + 1] ** 2 +
                    agentPositions[idx + 2] ** 2
                );
                
                if (distance > 0.1) {
                    const force = forceStrength / distance;
                    agentVelocities[idx] -= (agentPositions[idx] / distance) * force;
                    agentVelocities[idx + 1] -= (agentPositions[idx + 1] / distance) * force;
                    agentVelocities[idx + 2] -= (agentPositions[idx + 2] / distance) * force;
                }
                
                // Apply damping
                agentVelocities[idx] *= 0.99;
                agentVelocities[idx + 1] *= 0.99;
                agentVelocities[idx + 2] *= 0.99;
                
                // Keep within bounds
                const maxDist = 100;
                if (distance > maxDist) {
                    const scale = maxDist / distance;
                    agentPositions[idx] *= scale;
                    agentPositions[idx + 1] *= scale;
                    agentPositions[idx + 2] *= scale;
                }
            }
            
            agentGeometry.attributes.position.needsUpdate = true;
        }

        // Controls
        document.getElementById('particle-size').addEventListener('input', (e) => {
            agentMaterial.uniforms.particleSize.value = parseFloat(e.target.value);
        });

        document.getElementById('show-edges').addEventListener('change', (e) => {
            edges.visible = e.target.checked;
        });

        document.getElementById('show-particles').addEventListener('change', (e) => {
            agentParticles.visible = e.target.checked;
        });

        // Animation loop
        const clock = new THREE.Clock();
        let frameCount = 0;
        let lastFpsUpdate = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const deltaTime = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();
            
            // Update FPS counter
            frameCount++;
            if (elapsedTime - lastFpsUpdate > 1) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsUpdate = elapsedTime;
            }
            
            // Update physics
            updatePhysics(deltaTime);
            
            // Update shader uniforms
            agentMaterial.uniforms.time.value = elapsedTime;
            edgeMaterial.uniforms.time.value = elapsedTime;
            
            // Auto-rotate camera
            if (document.getElementById('auto-rotate').checked) {
                const rotationSpeed = parseFloat(document.getElementById('rotation-speed').value);
                scene.rotation.y += deltaTime * rotationSpeed * 0.1;
            }
            
            // Rotate proposals
            proposalMesh.rotation.y += deltaTime * 0.5;
            proposalMesh.rotation.x += deltaTime * 0.3;

            // Fade edges using adjustable decay
            const decay = parseFloat(document.getElementById('line-decay').value || '0.995');
            for (let i = 0; i < activeEdgeCount * 2; i++) {
                if (edgeOpacities[i] > 0.01) {
                    edgeOpacities[i] *= decay;
                }
            }
            edgeGeometry.attributes.opacity.needsUpdate = true;

            // Follow selected agent
            if (document.getElementById('follow-selected').checked && selectedAgentId && agents.has(selectedAgentId)) {
                const a = agents.get(selectedAgentId);
                // Smoothly move controls target to agent position
                controls.target.lerp(a.position, 0.15);
                const desired = new THREE.Vector3().copy(a.position).add(followOffset);
                camera.position.lerp(desired, 0.1);
            }

            controls.update();
            composer.render();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation and WebSocket connection
        animate();
        connectWebSocket();

        // Keyboard shortcuts for layer toggles
        // m = monitoring, s = service, d = dispute, e = edges, p = particles, r = auto-rotate
        window.addEventListener('keydown', (e) => {
            const k = (e.key || '').toLowerCase();
            const toggle = (id) => {
                const el = document.getElementById(id);
                if (el) { el.checked = !el.checked; }
            };
            if (k === 'm') toggle('show-monitoring');
            else if (k === 's') toggle('show-service');
            else if (k === 'd') toggle('show-dispute');
            else if (k === 'e') toggle('show-edges');
            else if (k === 'p') toggle('show-particles');
            else if (k === 'r') toggle('auto-rotate');
        });

        // Clear edges control
        document.getElementById('clear-edges').addEventListener('click', () => {
            activeEdgeCount = 0;
            edgeGeometry.setDrawRange(0, 0);
            // also zero out opacities to avoid stray lines
            for (let i = 0; i < edgeOpacities.length; i++) edgeOpacities[i] = 0;
            edgeGeometry.attributes.opacity.needsUpdate = true;
        });

        // Zoom to fit
        document.getElementById('zoom-fit').addEventListener('click', () => {
            // Compute bounding sphere of current proposals (fallback to agents if none)
            const box = new THREE.Box3();
            if (activeProposalCount > 0) {
                for (const p of proposals.values()) {
                    box.expandByPoint(p.position);
                }
            } else if (activeAgentCount > 0) {
                for (const a of agents.values()) {
                    box.expandByPoint(a.position);
                }
            } else {
                box.expandByPoint(new THREE.Vector3());
            }
            const size = box.getSize(new THREE.Vector3()).length() || 1;
            const center = box.getCenter(new THREE.Vector3());
            controls.target.copy(center);
            const dist = Math.min(Math.max(size * 0.8, 30), 250);
            camera.position.copy(center.clone().add(new THREE.Vector3(dist, dist * 0.6, dist)));
        });

        // Mouse picking (click to select)
        function screenToNDCCoords(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 1 - 1;
            mouse.y = -(((event.clientY - rect.top) / rect.height) * 1 - 1);
        }

        function pickNearestAgent() {
            if (activeAgentCount === 0) return null;
            let bestId = null;
            let bestDist = Infinity;
            const v = new THREE.Vector3();
            for (const [id, a] of agents.entries()) {
                v.copy(a.position).project(camera);
                const dx = v.x - mouse.x;
                const dy = v.y - mouse.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < bestDist) {
                    bestDist = d2;
                    bestId = id;
                }
            }
            // Threshold to avoid accidental far picks
            return bestDist < 0.02 ? bestId : null;
        }

        function pickProposal() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(proposalMesh, true);
            if (intersects && intersects.length) {
                // Map instanceId to proposal by index
                const idx = intersects[0].instanceId;
                if (idx != null) {
                    for (const [pid, p] of proposals.entries()) {
                        if (p.index === idx) return pid;
                    }
                }
            }
            return null;
        }

        renderer.domElement.addEventListener('click', (e) => {
            screenToNDCCoords(e);
            const pid = pickProposal();
            if (pid) {
                setSelectedProposal(pid);
                return;
            }
            const aid = pickNearestAgent();
            if (aid) setSelectedAgent(aid);
        });

        // Find agent control
        document.getElementById('find-agent-btn').addEventListener('click', () => {
            const id = (document.getElementById('find-agent').value || '').trim();
            if (id && agents.has(id)) {
                setSelectedAgent(id);
                // center camera on it immediately
                const a = agents.get(id);
                controls.target.copy(a.position);
                camera.position.copy(a.position.clone().add(followOffset));
            }
        });

        // Generate some test data if not connected
        setTimeout(() => {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.log('Generating test data...');
                
                // Create test agents
                for (let i = 0; i < 100; i++) {
                    createAgent({
                        agent_id: `agent_${i}`,
                        agent_type: ['Developer', 'Investor', 'Validator', 'Arbitrator'][Math.floor(Math.random() * 4)],
                        tokens: Math.random() * 1000
                    });
                }
                
                // Create test proposals
                for (let i = 0; i < 10; i++) {
                    createProposal({
                        proposal_id: `proposal_${i}`,
                        title: `Test Proposal ${i}`,
                        funding_goal: Math.random() * 10000
                    });
                }
                
                // Create test connections
                setInterval(() => {
                    if (activeAgentCount > 0 && activeProposalCount > 0) {
                        createVoteConnection({
                            agent_id: `agent_${Math.floor(Math.random() * activeAgentCount)}`,
                            proposal_id: `proposal_${Math.floor(Math.random() * activeProposalCount)}`,
                            vote: Math.random() > 0.5 ? 'yes' : 'no'
                        });
                    }
                }, 500);
            }
        }, 2000);
    </script>
