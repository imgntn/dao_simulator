name: Supermajority Threshold Analysis
description: |
  Analysis of passing threshold effects from simple majority (50%) to near-unanimity (90%).
  Tests the hypothesis that higher thresholds improve decision quality but reduce throughput.
  Examines interaction with quorum requirements.
version: 2.0.0
author: DAO Simulator Research
tags:
  - supermajority
  - thresholds
  - consensus
  - gridlock
  - grid-search
baseConfig:
  template: compound
  overrides:
    voting_activity: 0.35
    proposal_creation_probability: 0.0025
    governance_rule: supermajority
    proposal_duration_steps: 168
  population:
    totalMembers: 100
    distribution:
      - archetype: passive_holder
        percentage: 50
      - archetype: delegate
        percentage: 20
      - archetype: governance_expert
        percentage: 15
      - archetype: investor
        percentage: 10
      - archetype: developer
        percentage: 5
sweep:
  grid:
    - parameter: governance_config.threshold
      label: threshold
      values:
        - 0.5
        - 0.55
        - 0.6
        - 0.67
        - 0.75
        - 0.9
    - parameter: governance_config.quorumPercentage
      label: quorum
      values:
        - 0.05
        - 0.1
        - 0.15
        - 0.2
        - 0.3
execution:
  runsPerConfig: 200
  stepsPerRun: 500
  seedStrategy: sequential
  baseSeed: 11111
  workers: 10
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Proposal Rejection Rate
    type: builtin
    builtin: proposal_rejection_rate
  - name: Proposal Abandonment Rate
    type: builtin
    builtin: proposal_abandonment_rate
  - name: Avg Time to Decision
    type: builtin
    builtin: avg_time_to_decision
  - name: Avg Margin of Victory
    type: builtin
    builtin: avg_margin_of_victory
  - name: Quorum Reach Rate
    type: builtin
    builtin: quorum_reach_rate
  - name: Voter Participation Rate
    type: builtin
    builtin: voter_participation_rate
  - name: Average Turnout
    type: builtin
    builtin: avg_votes_per_proposal
  - name: Voter Retention Rate
    type: builtin
    builtin: voter_retention_rate
  - name: Delegate Concentration
    type: builtin
    builtin: delegate_concentration
  - name: Whale Influence
    type: builtin
    builtin: whale_influence
  - name: Governance Capture Risk
    type: builtin
    builtin: governance_capture_risk
  - name: Collusion Threshold
    type: builtin
    builtin: collusion_threshold
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Treasury Growth Rate
    type: builtin
    builtin: treasury_growth_rate
output:
  directory: results/research/supermajority-thresholds
  formats:
    - json
    - csv
  includeRawRuns: false
  includeManifest: true
  includeStatistics: true
  includeRecommendations: true
