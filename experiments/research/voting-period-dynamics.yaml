name: Voting Period Dynamics
description: |
  Analysis of how voting period length affects participation, decision quality,
  and time-sensitive governance. Tests conviction voting's time-weighted
  advantage in longer voting periods.
version: 2.0.0
author: DAO Simulator Research
tags:
  - voting-period
  - temporal-dynamics
  - conviction-voting
  - deliberation
  - grid-search
baseConfig:
  template: compound
  overrides:
    voting_activity: 0.35
    proposal_creation_probability: 0.0025
    governance_config:
      quorumPercentage: 0.1
  population:
    totalMembers: 100
    distribution:
      - archetype: passive_holder
        percentage: 50
      - archetype: delegate
        percentage: 20
      - archetype: governance_expert
        percentage: 15
      - archetype: whale
        percentage: 10
      - archetype: developer
        percentage: 5
sweep:
  grid:
    - parameter: proposal_duration_steps
      label: votingPeriod
      values:
        - 24
        - 72
        - 168
        - 336
        - 504
        - 720
    - parameter: governance_rule
      label: votingType
      values:
        - majority
        - supermajority
        - quadratic
        - conviction
execution:
  runsPerConfig: 250
  stepsPerRun: 500
  seedStrategy: sequential
  baseSeed: 22222
  workers: 10
metrics:
  - name: Avg Time to Decision
    type: builtin
    builtin: avg_time_to_decision
  - name: Proposal Abandonment Rate
    type: builtin
    builtin: proposal_abandonment_rate
  - name: Proposal Rate
    type: builtin
    builtin: proposal_rate
  - name: Voter Participation Rate
    type: builtin
    builtin: voter_participation_rate
  - name: Average Turnout
    type: builtin
    builtin: avg_votes_per_proposal
  - name: Voter Retention Rate
    type: builtin
    builtin: voter_retention_rate
  - name: Participation Trend
    type: builtin
    builtin: participation_trend
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Quorum Reach Rate
    type: builtin
    builtin: quorum_reach_rate
  - name: Avg Margin of Victory
    type: builtin
    builtin: avg_margin_of_victory
  - name: Delegate Concentration
    type: builtin
    builtin: delegate_concentration
  - name: Whale Influence
    type: builtin
    builtin: whale_influence
  - name: Voting Power Utilization
    type: builtin
    builtin: voting_power_utilization
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Treasury Trend
    type: builtin
    builtin: treasury_trend
output:
  directory: results/research/voting-period-dynamics
  formats:
    - json
    - csv
  includeRawRuns: false
  includeManifest: true
  includeStatistics: true
  includeRecommendations: true
