name: Ablation - Governance Mechanisms
description: Disable key mechanisms to estimate their causal impact.
version: 1.0.0
author: DAO Simulator Research Framework
tags:
  - paper
  - ablation
  - governance
baseConfig:
  template: compound
  population:
    totalMembers: 200
  overrides:
    governance_rule: majority
    governance_config:
      quorumPercentage: 0.05
    voting_activity: 0.25
    proposal_creation_probability: 0.004
    proposal_duration_min_steps: 24
    proposal_duration_max_steps: 96
    treasury_target_reserve: 10000
    treasury_target_reserve_fraction: 0.6
    treasury_buffer_fraction: 0.2
    treasury_buffer_fill_rate: 0.5
    treasury_emergency_topup_rate: 0.25
    treasury_max_spend_fraction: 0.15
    participation_boost_strength: 0.6
    participation_boost_decay: 0.1
    participation_boost_max: 0.25
    participation_inactivity_boost: 0.15
    participation_reward_per_vote: 0.0
    proposal_bond_min: 10
    proposal_bond_max: 1000
    proposal_inactivity_steps: 72
    proposal_temp_check_fraction: 0.25
    proposal_fast_track_min_steps: 6
    proposal_fast_track_approval: 0.6
    proposal_fast_track_quorum: 0.2
    vote_power_cap_fraction: 0.15
    vote_power_quadratic_threshold: 250
    vote_power_velocity_window: 72
    vote_power_velocity_penalty: 0.5
    delegation_lock_steps: 48
sweep:
  grid:
    - parameter: treasury_stabilization_enabled
      values: [true, false]
    - parameter: participation_target_rate
      values: [0.0, 0.2]
    - parameter: proposal_bond_fraction
      values: [0.0, 0.01]
execution:
  runsPerConfig: 100
  stepsPerRun: 2000
  seedStrategy: sequential
  baseSeed: 202
  workers: 4
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
    description: "% of resolved proposals that passed"
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
    description: Average token-weighted voter participation
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
    description: Treasury balance at simulation end
  - name: Final Token Price
    type: builtin
    builtin: final_token_price
    description: Token price at simulation end
  - name: Final Member Count
    type: builtin
    builtin: final_member_count
    description: Number of DAO members at end
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
    description: Total proposals created
  - name: Quorum Reach Rate
    type: builtin
    builtin: quorum_reach_rate
    description: "% of proposals meeting participation threshold"
  - name: Avg Margin of Victory
    type: builtin
    builtin: avg_margin_of_victory
    description: How decisive votes are (0=tied, 1=unanimous)
  - name: Avg Time to Decision
    type: builtin
    builtin: avg_time_to_decision
    description: Average steps from proposal to resolution
  - name: Proposal Abandonment Rate
    type: builtin
    builtin: proposal_abandonment_rate
    description: "% of proposals that expired unresolved"
  - name: Proposal Rejection Rate
    type: builtin
    builtin: proposal_rejection_rate
    description: "% of resolved proposals that were rejected"
  - name: Governance Overhead
    type: builtin
    builtin: governance_overhead
    description: Total votes cast per resolved proposal
  - name: Unique Voter Count
    type: builtin
    builtin: unique_voter_count
    description: Members who voted at least once
  - name: Voter Participation Rate
    type: builtin
    builtin: voter_participation_rate
    description: "% of members who ever voted"
  - name: Voter Concentration Gini
    type: builtin
    builtin: voter_concentration_gini
    description: Inequality of voting activity (0=equal, 1=one voter)
  - name: Delegate Concentration
    type: builtin
    builtin: delegate_concentration
    description: "% of votes from top 10% of voters"
  - name: Avg Votes Per Proposal
    type: builtin
    builtin: avg_votes_per_proposal
    description: Average unique voters per proposal
  - name: Voter Retention Rate
    type: builtin
    builtin: voter_retention_rate
    description: "% of early voters still voting late"
  - name: Voting Power Utilization
    type: builtin
    builtin: voting_power_utilization
    description: "% of available voting power actually used"
  - name: Treasury Volatility
    type: builtin
    builtin: treasury_volatility
    description: Coefficient of variation of treasury over time
  - name: Treasury Growth Rate
    type: builtin
    builtin: treasury_growth_rate
    description: (final - initial) / initial treasury
  - name: Staking Participation
    type: builtin
    builtin: staking_participation
    description: "% of tokens currently staked"
  - name: Token Concentration Gini
    type: builtin
    builtin: token_concentration_gini
    description: Inequality of token holdings
  - name: Avg Member Wealth
    type: builtin
    builtin: avg_member_wealth
    description: Average tokens per member
  - name: Wealth Mobility
    type: builtin
    builtin: wealth_mobility
    description: Inverse of wealth concentration (higher = more mobile)
  - name: Whale Influence
    type: builtin
    builtin: whale_influence
    description: "% of votes from top 10% token holders"
  - name: Whale Proposal Rate
    type: builtin
    builtin: whale_proposal_rate
    description: "% of proposals created by whales"
  - name: Governance Capture Risk
    type: builtin
    builtin: governance_capture_risk
    description: Concentration of proposal creation
  - name: Vote Buying Vulnerability
    type: builtin
    builtin: vote_buying_vulnerability
    description: Avg tokens needed to flip close votes
  - name: Single Entity Control
    type: builtin
    builtin: single_entity_control
    description: Max % any one member could control
  - name: Collusion Threshold
    type: builtin
    builtin: collusion_threshold
    description: Min % of members for majority control
  - name: Participation Trend
    type: builtin
    builtin: participation_trend
    description: Slope of participation (+ = increasing)
  - name: Treasury Trend
    type: builtin
    builtin: treasury_trend
    description: Slope of treasury over time
  - name: Member Growth Rate
    type: builtin
    builtin: member_growth_rate
    description: (final - initial) / initial members
  - name: Proposal Rate
    type: builtin
    builtin: proposal_rate
    description: Proposals per 100 simulation steps
  - name: Governance Activity Index
    type: builtin
    builtin: governance_activity_index
    description: "Composite: proposal_rate * participation * resolution"
  - name: Final Gini
    type: builtin
    builtin: final_gini
    description: Token distribution Gini coefficient
  - name: Final Reputation Gini
    type: builtin
    builtin: final_reputation_gini
    description: Reputation distribution Gini coefficient
output:
  directory: results/paper/02-ablation-governance
  formats:
    - json
    - csv
  includeRawRuns: true
  includeManifest: true
  includeTimeline: false
