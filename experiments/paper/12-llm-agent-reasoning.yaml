# Experiment 12: LLM Agent Reasoning (runner-compatible schema)

name: LLM Agent Reasoning Modes
description: >
  Compares governance outcomes across rule-based, hybrid, all-LLM, and
  hybrid-with-reporter modes while tracking LLM consistency, cache behavior,
  and latency.
version: 1.0.0
author: DAO Simulator Research Framework
tags:
  - paper
  - llm
  - governance

baseConfig:
  template: compound
  overrides:
    governance_rule: majority
    learning_enabled: false
    forum_enabled: true

    # Baseline population mix
    num_developers: 4
    num_investors: 2
    num_traders: 1
    num_passive_members: 4
    num_proposal_creators: 2
    num_validators: 1
    num_delegators: 2
    num_governance_experts: 1
    num_risk_managers: 1

    # LLM runtime settings
    llm_base_url: http://localhost:11434
    llm_default_model: qwen3:8b
    llm_premium_model: qwen3:8b
    llm_max_concurrent: 4
    llm_timeout_ms: 5000
    llm_temperature: 0.3
    llm_cache_enabled: true
    llm_max_tokens: 256

sweep:
  type: zip
  grid:
    - parameter: llm_agent_mode
      values: [disabled, hybrid, all, hybrid]
    - parameter: llm_enabled
      values: [false, true, true, true]
    - parameter: llm_hybrid_fraction
      values: [0.0, 0.3, 1.0, 0.3]
    - parameter: num_llm_agents
      values: [0, 4, 8, 4]
    - parameter: num_llm_reporters
      values: [0, 1, 1, 1]

    # Force non-LLM roles to zero for all-LLM mode only
    - parameter: num_developers
      values: [4, 4, 0, 4]
    - parameter: num_investors
      values: [2, 2, 0, 2]
    - parameter: num_traders
      values: [1, 1, 0, 1]
    - parameter: num_passive_members
      values: [4, 4, 0, 4]
    - parameter: num_proposal_creators
      values: [2, 2, 0, 2]
    - parameter: num_validators
      values: [1, 1, 0, 1]
    - parameter: num_delegators
      values: [2, 2, 0, 2]
    - parameter: num_governance_experts
      values: [1, 1, 0, 1]
    - parameter: num_risk_managers
      values: [1, 1, 0, 1]

execution:
  runsPerConfig: 13
  stepsPerRun: 120
  seedStrategy: sequential
  baseSeed: 42
  workers: 1
  runTimeoutMs: 1800000

metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Voter Participation Rate
    type: builtin
    builtin: voter_participation_rate
  - name: Avg Margin of Victory
    type: builtin
    builtin: avg_margin_of_victory
  - name: Proposal Abandonment Rate
    type: builtin
    builtin: proposal_abandonment_rate
  - name: Governance Activity Index
    type: builtin
    builtin: governance_activity_index
  - name: LLM Vote Consistency
    type: builtin
    builtin: llm_vote_consistency
  - name: LLM Cache Hit Rate
    type: builtin
    builtin: llm_cache_hit_rate
  - name: LLM Avg Latency
    type: builtin
    builtin: llm_avg_latency_ms

output:
  directory: results/experiments/12-llm-reasoning-v4
  formats:
    - json
    - csv
  includeRawRuns: true
  includeManifest: true
  includeTimeline: false
