# Experiment 12: LLM Agent Reasoning
#
# Compares governance outcomes across three LLM agent modes:
# - disabled: Pure rule-based agents (baseline)
# - hybrid: 30% LLM + 70% rule-based (realistic deployment)
# - all: 100% LLM agents (full LLM reasoning)
#
# Also includes reporter mode to test news generation.
#
# Requirements: Ollama running at localhost:11434 with qwen3:8b model
# Note: Smaller agent count (50) to manage LLM costs/latency

name: "LLM Agent Reasoning Modes"
description: >
  Investigates how LLM-powered agent reasoning affects governance outcomes,
  voting patterns, and decision quality compared to rule-based agents.

# Common settings for all configs
defaults:
  steps: 500
  runs: 30
  seed: 42
  num_developers: 10
  num_investors: 5
  num_traders: 2
  num_passive_members: 10
  num_proposal_creators: 5
  num_validators: 3
  num_delegators: 5
  num_governance_experts: 2
  num_risk_managers: 2
  governance_rule: "majority"
  learning_enabled: false
  forum_enabled: true
  llm_base_url: "http://localhost:11434"
  llm_default_model: "qwen3:8b"
  llm_premium_model: "qwen3:8b"
  llm_max_concurrent: 8
  llm_temperature: 0.3
  llm_cache_enabled: true
  llm_max_tokens: 256

configs:
  - name: "Baseline (Rule-Based)"
    description: "No LLM agents — pure rule-based decision making"
    settings:
      llm_enabled: false
      llm_agent_mode: "disabled"
      num_llm_agents: 0
      num_llm_reporters: 0

  - name: "Hybrid Mode (30% LLM)"
    description: "30% of agents use LLM reasoning, 70% rule-based"
    settings:
      llm_enabled: true
      llm_agent_mode: "hybrid"
      llm_hybrid_fraction: 0.3
      num_llm_agents: 15
      num_llm_reporters: 1

  - name: "All LLM"
    description: "100% LLM-powered voting decisions (all agents are LLMAgent)"
    settings:
      llm_enabled: true
      llm_agent_mode: "all"
      num_llm_agents: 49
      num_llm_reporters: 1
      num_developers: 0
      num_investors: 0
      num_traders: 0
      num_passive_members: 0
      num_proposal_creators: 0
      num_validators: 0
      num_delegators: 0
      num_governance_experts: 0
      num_risk_managers: 0

  - name: "Hybrid with Reporter"
    description: "Hybrid mode with LLM reporter generating news summaries"
    settings:
      llm_enabled: true
      llm_agent_mode: "hybrid"
      llm_hybrid_fraction: 0.3
      num_llm_agents: 10
      num_llm_reporters: 2

metrics:
  - name: "Proposal Pass Rate"
    type: builtin
    builtin: proposal_pass_rate
  - name: "Average Turnout"
    type: builtin
    builtin: average_turnout
  - name: "Final Treasury"
    type: builtin
    builtin: final_treasury
  - name: "Voter Participation Rate"
    type: builtin
    builtin: voter_participation_rate
  - name: "Avg Margin of Victory"
    type: builtin
    builtin: avg_margin_of_victory
  - name: "Proposal Abandonment Rate"
    type: builtin
    builtin: proposal_abandonment_rate
  - name: "Governance Activity Index"
    type: builtin
    builtin: governance_activity_index
  - name: "LLM Vote Consistency"
    type: builtin
    builtin: llm_vote_consistency
  - name: "LLM Cache Hit Rate"
    type: builtin
    builtin: llm_cache_hit_rate
  - name: "LLM Avg Latency"
    type: builtin
    builtin: llm_avg_latency_ms

output:
  format: "json"
  directory: "results/experiments/12-llm-reasoning"
  include_raw_data: false
  include_confidence_intervals: true
