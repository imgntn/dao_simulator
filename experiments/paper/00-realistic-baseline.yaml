name: Realistic Baseline
description: >
  Calibrated Compound digital twin baseline grounded in empirical on-chain
  and forum data. Uses the calibration pipeline to derive voting activity,
  proposal frequency, participation rates, oracle pricing, forum dynamics,
  and governance tuning from the Compound calibration profile
  (results/historical/calibration/compound_profile.json).
version: 2.0.0
author: DAO Simulator Research Framework
tags:
  - paper
  - baseline
  - realistic
  - calibration
  - digital-twin
  - compound

baseConfig:
  template: compound
  population:
    totalMembers: 200
    distribution:
      - archetype: passive_holder
        percentage: 35
      - archetype: active_voter
        percentage: 20
      - archetype: delegate
        percentage: 15
      - archetype: governance_whale
        percentage: 15
      - archetype: staker
        percentage: 10
      - archetype: governance_expert
        percentage: 5
  overrides:
    calibration_dao_id: compound
    oracle_type: calibrated_gbm
    forum_enabled: true
    learning_enabled: false

execution:
  runsPerConfig: 100
  stepsPerRun: 2000
  seedStrategy: sequential
  baseSeed: 42
  workers: 8

metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
  - name: Quorum Reach Rate
    type: builtin
    builtin: quorum_reach_rate
  - name: Proposal Rejection Rate
    type: builtin
    builtin: proposal_rejection_rate
  - name: Final Gini
    type: builtin
    builtin: final_gini
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Whale Influence
    type: builtin
    builtin: whale_influence
  - name: Governance Capture Risk
    type: builtin
    builtin: governance_capture_risk
  - name: Voter Participation Rate
    type: builtin
    builtin: voter_participation_rate
  - name: Unique Voter Count
    type: builtin
    builtin: unique_voter_count
  - name: Delegate Concentration
    type: builtin
    builtin: delegate_concentration
  - name: Single Entity Control
    type: builtin
    builtin: single_entity_control
  - name: Collusion Threshold
    type: builtin
    builtin: collusion_threshold
  - name: Treasury Growth Rate
    type: builtin
    builtin: treasury_growth_rate

output:
  directory: results/paper/00-realistic-baseline
  formats:
    - json
    - csv
  includeRawRuns: true
  includeManifest: true
  includeTimeline: false
