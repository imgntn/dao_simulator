name: Voting Mechanism Comparison
description: Compares majority, quadratic, and conviction voting across quorum levels (RQ3).
version: 1.0.0
author: DAO Simulator Research Framework
tags:
  - paper
  - voting
  - mechanisms
  - rq3
baseConfig:
  template: compound
  population:
    totalMembers: 200
  overrides:
    voting_activity: 0.25
    proposal_creation_probability: 0.004
    proposal_duration_min_steps: 24
    proposal_duration_max_steps: 96
    treasury_stabilization_enabled: true
    treasury_target_reserve: 10000
    treasury_target_reserve_fraction: 0.6
    treasury_buffer_fraction: 0.2
    treasury_buffer_fill_rate: 0.5
    treasury_emergency_topup_rate: 0.25
    treasury_max_spend_fraction: 0.15
    participation_target_rate: 0.2
    participation_boost_strength: 0.6
    participation_boost_decay: 0.1
    participation_boost_max: 0.25
    participation_inactivity_boost: 0.15
    participation_reward_per_vote: 0.0
    proposal_bond_fraction: 0.01
    proposal_bond_min: 10
    proposal_bond_max: 1000
    proposal_inactivity_steps: 72
    proposal_temp_check_fraction: 0.25
    proposal_fast_track_min_steps: 6
    proposal_fast_track_approval: 0.6
    proposal_fast_track_quorum: 0.2
    vote_power_cap_fraction: 0.15
    vote_power_quadratic_threshold: 250
    vote_power_velocity_window: 72
    vote_power_velocity_penalty: 0.5
    delegation_lock_steps: 48
sweep:
  type: grid
  parameters:
    - parameter: governance_rule
      values: [majority, quadratic, conviction]
    - parameter: governance_config.quorumPercentage
      values: [0.04, 0.08]
execution:
  runsPerConfig: 30
  stepsPerRun: 2000
  seedStrategy: sequential
  baseSeed: 909
  workers: 4
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
    description: "% of resolved proposals that passed"
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
    description: Average token-weighted voter participation
  - name: Final Gini
    type: builtin
    builtin: final_gini
    description: Token distribution Gini coefficient
  - name: Final Reputation Gini
    type: builtin
    builtin: final_reputation_gini
    description: Reputation distribution Gini coefficient
  - name: Whale Influence
    type: builtin
    builtin: whale_influence
    description: "% of votes from top 10% token holders"
  - name: Governance Capture Risk
    type: builtin
    builtin: governance_capture_risk
    description: Concentration of proposal creation
  - name: Avg Margin of Victory
    type: builtin
    builtin: avg_margin_of_victory
    description: How decisive votes are (0=tied, 1=unanimous)
  - name: Voter Participation Rate
    type: builtin
    builtin: voter_participation_rate
    description: "% of members who ever voted"
  - name: Delegate Concentration
    type: builtin
    builtin: delegate_concentration
    description: "% of votes from top 10% of voters"
  - name: Quorum Reach Rate
    type: builtin
    builtin: quorum_reach_rate
    description: "% of proposals meeting participation threshold"
  - name: Voter Concentration Gini
    type: builtin
    builtin: voter_concentration_gini
    description: Inequality of voting activity (0=equal, 1=one voter)
  - name: Token Concentration Gini
    type: builtin
    builtin: token_concentration_gini
    description: Inequality of token holdings
  - name: Single Entity Control
    type: builtin
    builtin: single_entity_control
    description: Max % any one member could control
  - name: Collusion Threshold
    type: builtin
    builtin: collusion_threshold
    description: Min % of members for majority control
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
    description: Treasury balance at simulation end
  - name: Treasury Volatility
    type: builtin
    builtin: treasury_volatility
    description: Coefficient of variation of treasury over time
output:
  directory: results/paper/09-voting-mechanisms
  formats:
    - json
    - csv
  includeRawRuns: true
  includeManifest: true
  includeTimeline: false
