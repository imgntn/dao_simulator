name: Quick Validation Suite
description: |
  Rapid validation experiment to verify core simulation mechanics are working
  correctly. Tests multiple voting systems, quorum levels, and checks for
  reasonable metric ranges.
version: 2.0.0
author: DAO Simulator Research
tags:
  - validation
  - quick-test
  - sanity-check
baseConfig:
  template: compound
  overrides:
    voting_activity: 0.35
    proposal_creation_probability: 0.003
  population:
    totalMembers: 50
    distribution:
      - archetype: passive_holder
        percentage: 50
      - archetype: delegate
        percentage: 20
      - archetype: governance_expert
        percentage: 15
      - archetype: whale
        percentage: 10
      - archetype: developer
        percentage: 5
sweep:
  grid:
    - parameter: governance_rule
      label: votingType
      values:
        - majority
        - quadratic
        - conviction
    - parameter: governance_config.quorumPercentage
      label: quorum
      values:
        - 0.05
        - 0.15
        - 0.3
        - 0.5
execution:
  runsPerConfig: 30
  stepsPerRun: 200
  seedStrategy: sequential
  baseSeed: 42
  workers: 8
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Quorum Reach Rate
    type: builtin
    builtin: quorum_reach_rate
  - name: Voter Participation Rate
    type: builtin
    builtin: voter_participation_rate
  - name: Average Turnout
    type: builtin
    builtin: avg_votes_per_proposal
  - name: Whale Influence
    type: builtin
    builtin: whale_influence
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
output:
  directory: results/quick-validation-suite
  formats:
    - json
    - csv
  includeRawRuns: false
  includeManifest: true
  includeStatistics: true
  includeRecommendations: true
