name: Simple Sweep Test
description: Test parameter sweep with fewer values
baseConfig:
  template: compound
  population:
    totalMembers: 30
sweep:
  parameter: governance_config.quorumPercentage
  values:
    - 0.02
    - 0.05
    - 0.1
execution:
  runsPerConfig: 10
  stepsPerRun: 100
  seedStrategy: sequential
  baseSeed: 42
  workers: 8
metrics:
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Final Gini
    type: builtin
    builtin: final_gini
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
output:
  directory: results/simple-sweep
  formats:
    - json
    - csv
  includeRawRuns: true
  includeManifest: true
