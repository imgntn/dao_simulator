name: Voting System Comparison
description: Compare simple majority, quadratic, and conviction voting mechanisms
baseConfig:
  template: compound
  overrides:
    voting_activity: 0.5
    proposal_creation_probability: 0.005
  population:
    totalMembers: 100
sweep:
  parameter: governance_rule
  values:
    - majority
    - quadratic
    - conviction
execution:
  runsPerConfig: 50
  stepsPerRun: 500
  seedStrategy: sequential
  baseSeed: 42
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Final Gini
    type: builtin
    builtin: final_gini
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
output:
  directory: results/voting-comparison
  formats:
    - json
    - csv
  includeRawRuns: true
  includeManifest: true
