name: Quick Validation
description: Verify simulation metrics are working after fixes
version: 1.0.0
baseConfig:
  template: compound
  overrides:
    voting_activity: 0.7
    proposal_creation_probability: 0.008
    governance_config:
      quorumPercentage: 0.1
  population:
    totalMembers: 100
    distribution:
      - archetype: active_voter
        percentage: 50
      - archetype: governance_expert
        percentage: 20
      - archetype: delegate
        percentage: 20
      - archetype: investor
        percentage: 10
sweep:
  parameter: governance_rule
  values:
    - majority
    - conviction
    - supermajority
execution:
  runsPerConfig: 30
  stepsPerRun: 500
  baseSeed: 42
  workers: 4
output:
  directory: results/quick-validation
  formats:
    - json
    - csv
metrics:
  - name: proposal_pass_rate
  - name: quorum_reach_rate
  - name: avg_time_to_decision
  - name: voter_participation_rate
  - name: total_proposals
