name: Quorum Impact Study
description: Measure actual quorum impact with wider range and proper metrics
baseConfig:
  template: compound
  overrides:
    proposalConfig:
      proposalProbability: 0.08
  population:
    totalMembers: 50
sweep:
  parameter: governance_config.quorumPercentage
  values:
    - 0.01
    - 0.02
    - 0.03
    - 0.05
    - 0.1
execution:
  runsPerConfig: 100
  stepsPerRun: 500
  seedStrategy: sequential
  baseSeed: 42
  workers: 8
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Final Gini
    type: builtin
    builtin: final_gini
  - name: Final Member Count
    type: builtin
    builtin: final_member_count
output:
  directory: results/quorum-impact-study
  formats:
    - json
    - csv
  includeRawRuns: true
  includeManifest: true
  includeTimeline: false
