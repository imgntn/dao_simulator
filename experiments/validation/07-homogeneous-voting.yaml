name: Homogeneous Agent Voting Test
description: |
  Test voting_activity parameter with homogeneous agent populations.
  Using only passive_holder agents (which respect voting_activity)
  ensures we can properly test the parameter's effect.

  This isolates the voting_activity parameter from agent-type bypasses.
baseConfig:
  template: compound
  overrides:
    proposal_creation_probability: 0.005
  population:
    totalMembers: 100
    distribution:
      - archetype: passive_holder
        percentage: 100
sweep:
  parameter: voting_activity
  values:
    - 0
    - 0.2
    - 0.4
    - 0.6
    - 0.8
    - 1
execution:
  runsPerConfig: 30
  stepsPerRun: 300
  seedStrategy: sequential
  baseSeed: 42
metrics:
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
output:
  directory: results/validation/homogeneous-voting
  formats:
    - json
    - csv
