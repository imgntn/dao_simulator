name: Quorum Total Participation
description: |
  Verify that quorum requires total participation (votesFor + votesAgainst),
  not just votes for. This is critical for preventing proposals from passing
  with minimal participation when there's no opposition.

  Test: With very low voting activity, proposals should fail due to
  insufficient TOTAL participation, even if all votes are "for".
baseConfig:
  template: compound
  overrides:
    voting_activity: 0.05
    governance_config:
      quorumPercentage: 0.1
  population:
    totalMembers: 100
sweep:
  parameter: governance_config.quorumPercentage
  values:
    - 0.05
    - 0.1
    - 0.15
    - 0.2
execution:
  runsPerConfig: 10
  stepsPerRun: 200
  seedStrategy: sequential
  baseSeed: 42
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Average Turnout
    type: builtin
    builtin: average_turnout
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
output:
  directory: results/validation/quorum-participation
  formats:
    - json
    - csv
  includeRawRuns: true
