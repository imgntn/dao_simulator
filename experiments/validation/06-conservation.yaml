name: Token Conservation
description: |
  Verify that token conservation holds throughout the simulation.
  Total tokens (agents + treasury) should not exceed initial supply.
  This test runs a standard simulation and checks conservation at the end.
baseConfig:
  template: compound
  overrides:
    voting_activity: 0.3
    proposal_creation_probability: 0.005
  population:
    totalMembers: 100
    distribution:
      - archetype: passive_holder
        percentage: 40
      - archetype: active_voter
        percentage: 40
      - archetype: delegate
        percentage: 20
sweep:
  parameter: seed
  values:
    - 42
    - 123
    - 456
execution:
  runsPerConfig: 5
  stepsPerRun: 300
  seedStrategy: sequential
  baseSeed: 42
metrics:
  - name: Proposal Pass Rate
    type: builtin
    builtin: proposal_pass_rate
  - name: Total Proposals
    type: builtin
    builtin: total_proposals
  - name: Final Treasury
    type: builtin
    builtin: final_treasury
  - name: Final Token Price
    type: builtin
    builtin: final_token_price
output:
  directory: results/validation/conservation
  formats:
    - json
